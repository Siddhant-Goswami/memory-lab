<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Modeling Lab — Design a database by modeling its world</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23F96846'/><text x='50' y='72' font-size='62' font-family='monospace' font-weight='700' text-anchor='middle' fill='%23fff'>x</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="css/tokens.css" />
<link rel="stylesheet" href="css/app.css" />
</head>
<body>

<!-- ============ SIDEBAR ============ -->
<aside id="sidebar">
  <div class="brand">
    <a class="brand-logo" id="homeLink">
      <span class="brand-100">100</span><span class="brand-x">x</span>
    </a>
    <span class="brand-lab">The Modeling Lab</span>
  </div>

  <nav id="moduleNav"></nav>

  <div class="sidebar-foot">
    <button id="resetBtn" class="btn btn--ghost btn--sm"><i data-lucide="rotate-ccw"></i> Reset progress</button>
  </div>
</aside>

<!-- ============ MAIN ============ -->
<main id="main">
  <div class="topbar">
    <button id="menuBtn" class="btn btn--ghost btn--sm only-mobile"><i data-lucide="panel-left"></i></button>
    <div class="topbar-progress"><div id="progressFill"></div></div>
    <div id="progressLabel" class="caption mono"></div>
  </div>

  <div id="stage"></div>

  <footer id="stepFooter" class="step-footer">
    <button id="backBtn" class="btn btn--secondary btn--sm"><i data-lucide="arrow-left"></i> Back</button>
    <div id="stepDots" class="step-dots"></div>
    <button id="continueBtn" class="btn btn--primary">Continue <i data-lucide="arrow-right"></i></button>
  </footer>
</main>

<div id="toast" class="toast"></div>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="js/data.js"></script>
<script src="js/grader.js"></script>
<script src="js/app.js"></script>
</body>
</html>
